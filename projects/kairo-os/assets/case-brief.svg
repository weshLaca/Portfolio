  <rect x="40" y="100" width="380" height="56" rx="16" fill="#3a1e1a"/>
  <rect x="66" y="122" width="140" height="14" rx="7" fill="rgba(247,247,242,.7)"/>
  <g stroke="rgba(247,247,242,.1)">
    <line x1="40" y1="216" x2="420" y2="216"/>
    <line x1="40" y1="286" x2="420" y2="286"/>
    <line x1="40" y1="356" x2="420" y2="356"/>
    <line x1="132" y1="176" x2="132" y2="430"/>
    <line x1="224" y1="176" x2="224" y2="430"/>
