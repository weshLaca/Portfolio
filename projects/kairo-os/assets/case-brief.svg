    <rect x="508" y="304" width="150" height="12" rx="6" fill="rgba(247,247,242,.4)"/>

    <rect x="476" y="344" width="20" height="20" rx="5" fill="none" stroke="rgba(247,247,242,.4)" stroke-width="2"/>
    <rect x="508" y="348" width="190" height="12" rx="6" fill="rgba(247,247,242,.4)"/>
