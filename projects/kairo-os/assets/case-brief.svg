  <rect x="52" y="192" width="60" height="20" rx="6" fill="#f0836f"/>
  <rect x="146" y="262" width="60" height="20" rx="6" fill="#d7ed57"/>
  <rect x="238" y="332" width="60" height="20" rx="6" fill="#3fc7bd"/>
  <rect x="330" y="192" width="60" height="20" rx="6" fill="#f0836f"/>
  <rect x="52" y="332" width="60" height="20" rx="6" fill="#3fc7bd"/>

