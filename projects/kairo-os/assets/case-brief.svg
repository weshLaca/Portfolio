      <stop offset="0%" stop-color="#331b18"/>
      <stop offset="100%" stop-color="#1c100e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="480" fill="url(#briefbg)"/>

  <rect x="40" y="44" width="240" height="26" rx="13" fill="#e94b35"/>

  <!-- calendar -->
